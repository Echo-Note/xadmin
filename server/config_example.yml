# SECURITY WARNING: keep the secret key used in production secret!
# 加密密钥 生产服必须保证唯一性，你必须保证这个值的安全，否则攻击者可以用它来生成自己的签名值
# $ cat /dev/urandom | tr -dc A-Za-z0-9 | head -c 49;echo
SECRET_KEY:

# Development env open this, when error occur display the full process track, Production disable it
# DEBUG 模式 开启DEBUG后遇到错误时可以看到更多日志，正式服要禁用，开发阶段，需要取消该注释，否则会导致前端ws连接失败
# DEBUG: true

# DEBUG, INFO, WARNING, ERROR, CRITICAL can set. See https://docs.djangoproject.com/zh-hans/5.0/topics/logging/
# 日志级别
# LOG_LEVEL: DEBUG

# 用于DEBUG模式下，输出sql日志
# DEBUG_DEV: true

# Database setting, Support sqlite3, mysql, postgres ....
# 数据库设置
# ### 更多数据库配置，参考官方文档：https://docs.djangoproject.com/zh-hans/5.0/ref/databases/
# 创建竖数据库sql
# create database xadmin default character set utf8mb4 COLLATE utf8mb4_bin;
# grant all on xadmin.* to server@'127.0.0.1' identified by 'KGzKjZpWBp4R4RSa';

# SQLite setting:
# 使用单文件sqlite数据库
# DB_ENGINE: sqlite3
# DB_DATABASE:
# MySQL or postgres setting like:
# DB_ENGINE can set mysql, oracle, postgresql, sqlite3

# 使用 Mariadb 作为数据库
#DB_ENGINE: mysql
#DB_HOST: mysql
#DB_PORT: 3306

# 使用 postgresql 作为数据库[默认数据库]
DB_ENGINE: postgresql
DB_HOST: postgresql
DB_PORT: 5432

DB_USER: server
DB_DATABASE: xadmin
#DB_PASSWORD: KGzKjZpWBp4R4RSa


# Use Redis as broker for celery and web socket
# Redis配置
REDIS_HOST: redis
REDIS_PORT: 6379
#REDIS_PASSWORD: nineven
#DEFAULT_CACHE_ID: 1
#CHANNEL_LAYERS_CACHE_ID: 2
#CELERY_BROKER_CACHE_ID: 3

# When Django start it will bind this host and port
# ./manage.py runserver 127.0.0.1:8896
# 运行时绑定端口
HTTP_BIND_HOST: 0.0.0.0
HTTP_LISTEN_PORT: 8896
GUNICORN_MAX_WORKER: 4
CELERY_WORKER_COUNT: 4

# ---- 存储设置 ----
# 媒体文件存储后端: local（本地）/ s3（S3 兼容对象存储）
#STORAGE_BACKEND: local
# 静态文件存储后端: local（本地 StaticFilesStorage）/ s3（public-read S3）
#STATIC_STORAGE_BACKEND: local

# ---- S3 兼容对象存储（媒体文件）----
# 端点 URL — 不同云厂商填入不同地址
# AWS S3（默认）:       留空
# 阿里云 OSS:           https://oss-{region}.aliyuncs.com
# 腾讯云 COS:           https://cos.{region}.myqcloud.com
# MinIO:                 http://minio:9000
#STORAGE_S3_ENDPOINT_URL:
#STORAGE_S3_ACCESS_KEY:
#STORAGE_S3_SECRET_KEY:
#STORAGE_S3_BUCKET_NAME:
#STORAGE_S3_REGION_NAME:
#STORAGE_S3_USE_SSL: true
#STORAGE_S3_VERIFY: true
#STORAGE_S3_SIGNATURE_VERSION: s3v4
# 寻址方式："path"（MinIO/阿里云/腾讯云等 S3 兼容服务）/"virtual"（AWS S3）
#STORAGE_S3_ADDRESSING_STYLE: path
#STORAGE_S3_CUSTOM_DOMAIN:
#STORAGE_S3_DEFAULT_ACL:
#STORAGE_S3_QUERYSTRING_AUTH: true
